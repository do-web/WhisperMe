appId: com.whisperme.app
productName: WhisperMe
mac:
  category: public.app-category.productivity
  icon: assets/icon.icns
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - dmg
    - zip
  extendInfo:
    LSUIElement: true
  extraFiles:
    - from: build/Release/fn_monitor.node
      to: build/Release/fn_monitor.node
files:
  - dist/main/**/*
  - dist/preload/**/*
  - dist/shared/**/*
  - assets/**/*
  - src/renderer/**/*.html
  - src/renderer/**/*.css
